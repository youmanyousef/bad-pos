version: '3'
services:
  app:
    build: .
    container_name: posapp
    user: "${LOCAL_UID}:${LOCAL_GID}"
    volumes:
      - ./pos:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/output-buffering.ini
    ports:
      - "8080:80"
    depends_on:
      - db
  db:
    image: mysql:5.7.31
    container_name: mysqldb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users
    expose:
      - "3306"
    volumes:
      - ./db_init_scripts:/docker-entrypoint-initdb.d
#volumes:

